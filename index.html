<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailTrack QR — Asset Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rail-blue:  #0a2a4a;
      --rail-mid:   #0f3d6e;
      --accent:     #f5a623;
      --steel:      #c8d8e8;
      --light-bg:   #edf2f7;
      --white:      #ffffff;
      --text-main:  #1a2b3c;
      --text-muted: #607080;
      --danger:     #e53e3e;
      --radius:     10px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--rail-blue) 0%, #153e6e 55%, #1a5fa8 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-main);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 119px, rgba(255,255,255,.04) 120px),
        repeating-linear-gradient(180deg, transparent, transparent 59px, rgba(255,255,255,.025) 60px);
      pointer-events: none;
    }

    .wheel-bg {
      position: fixed;
      right: -120px;
      bottom: -120px;
      width: 520px;
      height: 520px;
      opacity: .06;
      animation: spin 40s linear infinite;
    }
    .wheel-bg-left {
      position: fixed;
      left: -160px;
      top: -160px;
      width: 480px;
      height: 480px;
      opacity: .04;
      animation: spin 60s linear infinite reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card {
      background: var(--white);
      border-radius: 18px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.35);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .card-header {
      background: linear-gradient(135deg, var(--rail-blue), var(--rail-mid));
      padding: 32px 40px 26px;
      text-align: center;
      border-bottom: 3px solid var(--accent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .logo-icon { width: 52px; height: 52px; }

    .brand { text-align: left; }
    .brand-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: .5px;
      line-height: 1.1;
    }
    .brand-sub {
      font-size: 11px;
      color: var(--steel);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .card-header p {
      color: var(--steel);
      font-size: 13px;
      margin-top: 2px;
    }

    /* form body */
    .card-body { padding: 32px 40px 28px; }

    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .input-wrap { position: relative; }
    .input-wrap svg.field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #94aab8;
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid #c8d8e8;
      border-radius: var(--radius);
      font-size: 14.5px;
      color: var(--text-main);
      background: var(--light-bg);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: var(--rail-mid);
      box-shadow: 0 0 0 3px rgba(15,61,110,.12);
      background: var(--white);
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94aab8;
      padding: 2px;
      display: flex;
      align-items: center;
    }
    .toggle-pw:hover { color: var(--rail-mid); }

    .aux-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .remember {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .remember input[type=checkbox] {
      accent-color: var(--rail-mid);
      width: 15px;
      height: 15px;
    }
    .forgot {
      font-size: 13px;
      color: var(--rail-mid);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--rail-mid), var(--rail-blue));
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .5px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover  { opacity: .91; }
    .btn-primary:active { transform: scale(.98); }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: var(--danger);
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.visible { display: flex; }

    /* links row below the button */
    .links-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .links-row a {
      font-size: 12.5px;
      color: var(--text-muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color .15s;
    }
    .links-row a:hover { color: var(--rail-mid); }
    .links-row a svg { flex-shrink: 0; }

    .card-footer {
      background: var(--light-bg);
      border-top: 1px solid #dce6ef;
      padding: 13px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-footer span { font-size: 11.5px; color: #b0c0cc; }
    .badge {
      background: var(--rail-blue);
      color: var(--steel);
      font-size: 10.5px;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: .5px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <svg class="wheel-bg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="95" stroke="white" stroke-width="6"/>
    <circle cx="100" cy="100" r="18" stroke="white" stroke-width="5"/>
    <circle cx="100" cy="100" r="50" stroke="white" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="100" y1="5"   x2="100" y2="195" stroke="white" stroke-width="3"/>
    <line x1="5"   y1="100" x2="195" y2="100" stroke="white" stroke-width="3"/>
    <line x1="32"  y1="32"  x2="168" y2="168" stroke="white" stroke-width="3"/>
    <line x1="168" y1="32"  x2="32"  y2="168" stroke="white" stroke-width="3"/>
  </svg>
  <svg class="wheel-bg-left" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="95" stroke="white" stroke-width="6"/>
    <circle cx="100" cy="100" r="18" stroke="white" stroke-width="5"/>
    <circle cx="100" cy="100" r="50" stroke="white" stroke-width="2" stroke-dasharray="6 6"/>
    <line x1="100" y1="5"   x2="100" y2="195" stroke="white" stroke-width="3"/>
    <line x1="5"   y1="100" x2="195" y2="100" stroke="white" stroke-width="3"/>
    <line x1="32"  y1="32"  x2="168" y2="168" stroke="white" stroke-width="3"/>
    <line x1="168" y1="32"  x2="32"  y2="168" stroke="white" stroke-width="3"/>
  </svg>

  <div class="card">

    <div class="card-header">
      <div class="logo-row">
        <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="24" stroke="#f5a623" stroke-width="3.5"/>
          <circle cx="26" cy="26" r="7" fill="#f5a623"/>
          <circle cx="26" cy="26" r="3.5" fill="#0a2a4a"/>
          <line x1="26" y1="2"   x2="26" y2="50"  stroke="#f5a623" stroke-width="2.5"/>
          <line x1="2"  y1="26"  x2="50" y2="26"  stroke="#f5a623" stroke-width="2.5"/>
          <line x1="9.5" y1="9.5" x2="42.5" y2="42.5" stroke="#f5a623" stroke-width="2.5"/>
          <line x1="42.5" y1="9.5" x2="9.5" y2="42.5" stroke="#f5a623" stroke-width="2.5"/>
          <circle cx="26" cy="26" r="14" stroke="#f5a623" stroke-width="1.5" stroke-dasharray="4 4"/>
        </svg>
        <div class="brand">
          <div class="brand-name">RailTrack QR</div>
          <div class="brand-sub">Asset Management</div>
        </div>
      </div>
      <p>Railway Wheel Inspection &amp; Tracking System</p>
    </div>

    <div class="card-body">

      <div class="error-msg" id="err-login">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.553.553 0 0 1-1.1 0L7.1 4.995z"/></svg>
        Invalid username or password.
      </div>

      <!-- hint for demo -->
      <p style="text-align:center;font-size:12px;color:#b0c0cc;margin-top:14px">
        Demo credentials: <strong style="color:#607080">admin / admin</strong>
      </p>

      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4z"/></svg>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="field-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a4 4 0 0 0-4 4v2H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm-2 5V5a2 2 0 1 1 4 0v1H6z"/></svg>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
          <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Show/hide password">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="aux-row">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button class="btn-primary" onclick="handleLogin()">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="currentColor" viewBox="0 0 16 16"><path d="M10 3.5a.5.5 0 0 0-.5-.5h-8a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5v-2a.5.5 0 0 1 1 0v2A1.5 1.5 0 0 1 9.5 14h-8A1.5 1.5 0 0 1 0 12.5v-9A1.5 1.5 0 0 1 1.5 2h8A1.5 1.5 0 0 1 11 3.5v2a.5.5 0 0 1-1 0v-2z"/><path d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/></svg>
        Sign In
      </button>

      <div class="links-row">
        <a href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>
          Help & Support
        </a>
        <a href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg>
          Privacy Policy
        </a>
        <a href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 16 16"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4.414A2 2 0 0 0 3 11.586l-2 2V2a1 1 0 0 1 1-1h12zM2 0a2 2 0 0 0-2 2v12.793a.5.5 0 0 0 .854.353l2.853-2.853A1 1 0 0 1 4.414 12H14a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/></svg>
          Contact Admin
        </a>
      </div>

    </div>

    <div class="card-footer">
      <span>© 2024 Febino Systems · v2.4.1</span>
      <span class="badge">SECURE</span>
    </div>

  </div>

  <script>
    function togglePw() {
      const pw  = document.getElementById('password');
      const ico = document.getElementById('eye-icon');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      ico.innerHTML = show
        ? '<path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709zm-2.172 2.172A5.948 5.948 0 0 1 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8l.195-.288c.335-.48.83-1.12 1.465-1.755.165-.165.337-.328.517-.486L2.64 4.763A7.03 7.03 0 0 0 0 8s3 5.5 8 5.5a7.028 7.028 0 0 0 2.79-.588l-.603-.602zm-1.04-1.04L4.5 7.733A3.5 3.5 0 0 0 8 11.5a3.48 3.48 0 0 0 2.147-.63zM5.5 4.852l5.647 5.647A3.5 3.5 0 0 0 8 4.5a3.48 3.48 0 0 0-2.5 1.053V4.852z"/><path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z"/>'
        : '<path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/><path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>';
    }

    function handleLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('err-login');

      if (!u || !p || u !== 'admin' || p !== 'admin') {
        err.textContent = (!u || !p) ? 'Please enter username and password.' : 'Invalid username or password.';
        err.classList.add('visible');
        setTimeout(() => err.classList.remove('visible'), 4000);
        return;
      }

      sessionStorage.setItem('rt_user', JSON.stringify({ name: 'A. Kumar', role: 'Wheel Inspector', username: u }));
      window.location.href = 'dashboard.html';
    }

    ['username', 'password'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); })
    );
  </script>
</body>
</html>
